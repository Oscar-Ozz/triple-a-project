version: '3.8'

services:
  # --- SERVICIO DE LA BASE DE DATOS ---
  db-server:
    image: mysql:8.0
    container_name: db-contenedor
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: inventario_db
    ports:
      - "3306:3306"
    volumes:
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql
      - mysql_data:/var/lib/mysql

  # --- SERVICIO DEL BACKEND (FLASK) ---
  backend-server:
    build: ./aaa-backend
    container_name: flask-contenedor
    restart: always
    ports:
      - "5000:5000"
    environment:
      - FLASK_ENV=production
    volumes:
      - ./aaa-backend/uploads:/app/uploads
    depends_on:
      - db-server

  # --- SERVICIO DEL FRONTEND (REACT) ---
  frontend-server:
    build: .
    container_name: react-contenedor
    restart: always
    ports:
      - "3000:3000"
    depends_on:
      - backend-server

volumes:
  mysql_data: